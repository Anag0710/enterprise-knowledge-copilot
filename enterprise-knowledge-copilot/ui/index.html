<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Knowledge Copilot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .status {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        
        .status-item {
            text-align: center;
        }
        
        .status-label {
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 5px;
        }
        
        .status-value {
            font-size: 18px;
            font-weight: bold;
            color: #28a745;
        }
        
        .status-value.loading {
            color: #ffc107;
        }
        
        .status-value.error {
            color: #dc3545;
        }
        
        .chat-container {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }
        
        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            text-align: right;
        }
        
        .message-content {
            display: inline-block;
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
        }
        
        .message.user .message-content {
            background: #667eea;
            color: white;
        }
        
        .message.agent .message-content {
            background: white;
            color: #333;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        .message-meta {
            font-size: 11px;
            margin-top: 5px;
            opacity: 0.7;
        }
        
        .sources {
            margin-top: 10px;
            padding: 10px;
            background: #e7f3ff;
            border-left: 3px solid #2196F3;
            font-size: 12px;
        }
        
        .sources strong {
            display: block;
            margin-bottom: 5px;
        }
        
        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
        }
        
        .input-wrapper {
            display: flex;
            gap: 10px;
        }
        
        #questionInput {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        #questionInput:focus {
            border-color: #667eea;
        }
        
        #askButton {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        #askButton:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        #askButton:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Enterprise Knowledge Copilot</h1>
            <p>Ask questions about your internal documents</p>
        </div>
        
        <div class="status">
            <div class="status-item">
                <div class="status-label">System Status</div>
                <div class="status-value loading" id="systemStatus">Loading...</div>
            </div>
            <div class="status-item">
                <div class="status-label">Vector Store</div>
                <div class="status-value loading" id="vectorStatus">Loading...</div>
            </div>
            <div class="status-item">
                <div class="status-label">LLM</div>
                <div class="status-value loading" id="llmStatus">Loading...</div>
            </div>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="message agent">
                <div class="message-content">
                    👋 Hello! I'm your Enterprise Knowledge Copilot. I can answer questions based on your internal documents with full citations and confidence scores.
                </div>
            </div>
        </div>
        
        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="questionInput" placeholder="Ask a question..." />
                <button id="askButton">Ask</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let conversationHistory = [];
        
        async function checkHealth() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                
                document.getElementById('systemStatus').textContent = data.status === 'healthy' ? '✓ Online' : '✗ Offline';
                document.getElementById('systemStatus').className = 'status-value ' + (data.status === 'healthy' ? '' : 'error');
                
                document.getElementById('vectorStatus').textContent = data.vector_store_ready ? '✓ Ready' : '✗ Not Ready';
                document.getElementById('vectorStatus').className = 'status-value ' + (data.vector_store_ready ? '' : 'error');
                
                document.getElementById('llmStatus').textContent = data.llm_enabled ? '✓ Enabled' : '⚠ Fallback';
                document.getElementById('llmStatus').className = 'status-value ' + (data.llm_enabled ? '' : 'loading');
            } catch (error) {
                document.getElementById('systemStatus').textContent = '✗ Offline';
                document.getElementById('systemStatus').className = 'status-value error';
            }
        }
        
        function addMessage(text, isUser, sources = null, confidence = null, status = null) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'agent'}`;
            
            let content = `<div class="message-content">${text}</div>`;
            
            if (!isUser && (sources || confidence || status)) {
                let meta = [];
                if (confidence !== null) meta.push(`Confidence: ${(confidence * 100).toFixed(1)}%`);
                if (status) meta.push(`Status: ${status}`);
                if (meta.length > 0) {
                    content += `<div class="message-meta">${meta.join(' • ')}</div>`;
                }
                
                if (sources && sources.length > 0) {
                    const sourceList = sources.map(s => `📄 ${s.source} (p${s.page || '?'})`).join('<br>');
                    content += `<div class="sources"><strong>Sources:</strong><br>${sourceList}</div>`;
                }
            }
            
            messageDiv.innerHTML = content;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        async function askQuestion() {
            const input = document.getElementById('questionInput');
            const button = document.getElementById('askButton');
            const question = input.value.trim();
            
            if (!question) return;
            
            input.value = '';
            input.disabled = true;
            button.disabled = true;
            button.innerHTML = '<span class="loading-spinner"></span>';
            
            addMessage(question, true);
            
            try {
                const response = await fetch(`${API_BASE}/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: question,
                        conversation_history: conversationHistory
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                conversationHistory.push(question);
                
                addMessage(data.answer, false, data.sources, data.confidence, data.status);
            } catch (error) {
                addMessage(`❌ Error: ${error.message}. Make sure the API server is running.`, false);
            } finally {
                input.disabled = false;
                button.disabled = false;
                button.textContent = 'Ask';
                input.focus();
            }
        }
        
        document.getElementById('askButton').addEventListener('click', askQuestion);
        document.getElementById('questionInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') askQuestion();
        });
        
        // Initialize
        checkHealth();
        setInterval(checkHealth, 30000);
    </script>
</body>
</html>
